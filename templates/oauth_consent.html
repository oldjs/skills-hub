{{define "title"}}授权确认 - Skills Hub{{end}}

{{define "content"}}
<div class="mx-auto flex min-h-[calc(100vh-140px)] max-w-lg items-center px-4 py-10">
    <section class="w-full rounded-[32px] border border-white/70 bg-white/95 p-6 shadow-[0_30px_80px_-50px_rgba(234,88,12,0.30)] sm:p-8">
        <div class="text-center mb-8">
            <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-orange-500 text-white shadow-lg shadow-orange-500/30">
                <i class="fas fa-shield-check text-lg"></i>
            </div>
            <h2 class="mt-5 text-2xl font-bold text-slate-900">授权确认</h2>
            <p class="mt-2 text-sm text-slate-500">
                <span class="font-semibold text-slate-700">{{.ClientName}}</span>
                请求访问你的 Skills Hub 账户信息
            </p>
        </div>

        <!-- 请求的权限 -->
        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-5 mb-6">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">该应用将获得以下权限</h3>
            <ul class="space-y-2 text-sm text-slate-600">
                <li class="flex items-center gap-2">
                    <i class="fas fa-check-circle text-emerald-500 text-xs"></i>
                    查看你的基本信息（名称）
                </li>
                <li class="flex items-center gap-2">
                    <i class="fas fa-check-circle text-emerald-500 text-xs"></i>
                    查看你的邮箱地址
                </li>
            </ul>
        </div>

        <form action="/oauth/authorize" method="POST">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <input type="hidden" name="client_id" value="{{.ClientID}}">
            <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
            <input type="hidden" name="response_type" value="code">
            <input type="hidden" name="scope" value="{{.Scope}}">
            <input type="hidden" name="state" value="{{.State}}">
            <input type="hidden" name="nonce" value="{{.Nonce}}">
            <div class="flex gap-3">
                <a href="{{.RedirectURI}}?error=access_denied&state={{.State}}" class="flex-1 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-center text-sm font-medium text-slate-600 transition hover:bg-slate-50">拒绝</a>
                <button type="submit" class="flex-1 rounded-2xl bg-orange-500 px-4 py-3 text-sm font-semibold text-white transition hover:bg-orange-600">同意授权</button>
            </div>
        </form>

        <div class="mt-6 text-center text-xs text-slate-400">
            Client ID: <span class="font-mono">{{.ClientID}}</span>
        </div>
    </section>
</div>
{{end}}
