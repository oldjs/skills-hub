{{define "layout"}}<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{template "title" .}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root {
            color-scheme: light;
        }
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .page-shell {
            min-height: calc(100vh - 129px);
            background:
                radial-gradient(circle at top left, rgba(99, 102, 241, 0.08), transparent 30%),
                radial-gradient(circle at top right, rgba(168, 85, 247, 0.06), transparent 28%),
                linear-gradient(180deg, #f8fafc 0%, #f9fafb 100%);
        }
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -26px rgba(15, 23, 42, 0.45);
            border-color: rgba(99, 102, 241, 0.22);
        }
        .category-tag {
            transition: all 0.2s ease;
        }
        .category-tag:hover {
            transform: translateY(-1px);
        }
        .install-btn {
            transition: all 0.2s ease;
        }
        .install-btn:hover {
            transform: translateY(-1px);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .surface-panel {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(14px);
        }
        .command-shell {
            background: linear-gradient(180deg, #111827 0%, #0f172a 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 antialiased">
    <nav class="surface-panel border-b border-white/70 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-violet-500 rounded-xl flex items-center justify-center shadow-sm shadow-indigo-200/70">
                        <i class="fas fa-bolt text-white text-sm"></i>
                    </div>
                    <span class="text-xl font-bold gradient-text">Skills Hub</span>
                </a>
                <div class="hidden md:flex items-center gap-3">
                    <a href="/" class="px-3 py-2 rounded-full text-sm text-gray-600 hover:text-gray-900 hover:bg-white transition {{if eq .CurrentPage "home"}}bg-indigo-50 text-indigo-600 font-medium{{end}}">首页</a>
                    <a href="/search" class="px-3 py-2 rounded-full text-sm text-gray-600 hover:text-gray-900 hover:bg-white transition {{if eq .CurrentPage "search"}}bg-indigo-50 text-indigo-600 font-medium{{end}}">搜索</a>
                    <button type="button" onclick="triggerSync(this)" class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-900 text-white text-sm hover:bg-slate-800 transition">
                        <i class="fas fa-rotate text-xs"></i>
                        <span>同步数据</span>
                    </button>
                </div>
                <button type="button" class="md:hidden w-10 h-10 rounded-xl border border-gray-200 bg-white text-gray-600" id="mobile-menu-btn">
                    <i class="fas fa-bars text-gray-600"></i>
                </button>
            </div>
        </div>
        <div class="md:hidden hidden border-t border-gray-100 bg-white/90" id="mobile-menu">
            <div class="px-4 py-3 space-y-2">
                <a href="/" class="block px-3 py-2 rounded-xl hover:bg-gray-100">首页</a>
                <a href="/search" class="block px-3 py-2 rounded-xl hover:bg-gray-100">搜索</a>
                <button type="button" onclick="triggerSync(this)" class="w-full text-left px-3 py-2 rounded-xl hover:bg-gray-100 text-gray-700">同步数据</button>
            </div>
        </div>
    </nav>

    <main class="page-shell">
        {{template "content" .}}
    </main>

    <footer class="bg-white/90 border-t border-gray-100">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-6 bg-gradient-to-br from-indigo-500 to-violet-500 rounded-lg flex items-center justify-center">
                        <i class="fas fa-bolt text-white text-xs"></i>
                    </div>
                    <span class="text-gray-600 text-sm">Skills Hub - OpenClaw 技能中心</span>
                </div>
                <div class="flex items-center gap-4 text-gray-400 text-sm">
                    <span>每 6 小时自动同步</span>
                    <span class="hidden md:inline">·</span>
                    <span>数据来源: <a href="https://clawhub.ai" target="_blank" class="text-indigo-500 hover:text-indigo-600">ClawHub</a></span>
                </div>
            </div>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
    <script>
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }
    </script>
</body>
</html>
{{end}}
