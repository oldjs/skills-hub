{{define "layout"}}<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{template "title" .}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root {
            color-scheme: light;
        }
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .page-shell {
            min-height: calc(100vh - 129px);
            background: #f4f5f7;
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(234, 88, 12, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(14, 165, 233, 0.05) 0%, transparent 40%);
        }
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px -12px rgba(234, 88, 12, 0.15);
            border-color: rgba(234, 88, 12, 0.3);
        }
        .surface-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
        }
        .command-shell {
            background: linear-gradient(180deg, #111827 0%, #0f172a 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 antialiased">
    <nav class="surface-panel border-b border-white/70 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center shadow-md shadow-orange-500/20">
                        <i class="fas fa-layer-group text-white text-sm"></i>
                    </div>
                    <span class="text-xl font-bold text-slate-900 tracking-tight">Skills Hub</span>
                </a>
                <div class="hidden md:flex items-center gap-6">
                    <a href="/" class="text-sm font-medium transition {{if eq .CurrentPage "home"}}text-orange-500{{else}}text-slate-600 hover:text-orange-500{{end}}">总览</a>
                    <a href="/search" class="text-sm font-medium transition {{if eq .CurrentPage "search"}}text-orange-500{{else}}text-slate-600 hover:text-orange-500{{end}}">探索</a>
                </div>
                <button type="button" class="md:hidden w-10 h-10 rounded-xl border border-gray-200 bg-white text-gray-600" id="mobile-menu-btn">
                    <i class="fas fa-bars text-gray-600"></i>
                </button>
            </div>
        </div>
        <div class="md:hidden hidden border-t border-gray-100 bg-white/90" id="mobile-menu">
            <div class="px-4 py-3 space-y-2">
                <a href="/" class="block px-3 py-2 rounded-xl hover:bg-gray-100">首页</a>
                <a href="/search" class="block px-3 py-2 rounded-xl hover:bg-gray-100">搜索</a>
            </div>
        </div>
    </nav>

    <main class="page-shell">
        {{template "content" .}}
    </main>

    <footer class="bg-white/90 border-t border-gray-100">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-6 bg-slate-200 rounded text-slate-500 flex items-center justify-center">
                        <i class="fas fa-layer-group text-xs"></i>
                    </div>
                    <span class="text-slate-500 text-sm font-medium">Skills Hub <span class="mx-2 font-normal">|</span> OpenClaw 生态中心</span>
                </div>
                <div class="flex items-center gap-4 text-slate-400 text-sm">
                    <span>自动同步</span>
                    <span class="hidden md:inline">·</span>
                    <span>数据源: <a href="https://clawhub.ai" target="_blank" class="text-slate-500 hover:text-orange-500 transition">ClawHub</a></span>
                </div>
            </div>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
    <script>
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }
    </script>
</body>
</html>
{{end}}
