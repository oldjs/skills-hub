{{define "title"}}{{.ErrorTitle}} - Skills Hub{{end}}
{{define "jsonld"}}{{end}}

{{define "content"}}
<div class="mx-auto flex min-h-[calc(100vh-200px)] max-w-lg items-center justify-center px-4 py-16">
    <div class="text-center">
        <div class="text-8xl font-bold text-slate-200">{{.ErrorCode}}</div>
        <h1 class="mt-4 text-2xl font-bold text-slate-900">{{.ErrorTitle}}</h1>
        <p class="mt-3 text-sm text-slate-500 leading-relaxed">{{.ErrorMessage}}</p>
        <div class="mt-8 flex items-center justify-center gap-4">
            <a href="/" class="rounded-xl bg-orange-500 px-5 py-2.5 text-sm font-medium text-white transition hover:bg-orange-600">返回首页</a>
            <button onclick="history.back()" class="rounded-xl border border-slate-200 px-5 py-2.5 text-sm font-medium text-slate-600 transition hover:bg-slate-50">返回上页</button>
        </div>
    </div>
</div>
{{end}}
