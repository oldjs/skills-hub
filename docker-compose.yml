services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: skills-hub:local
    container_name: skills-hub-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_PATH: /app/data/skills.db
      REDIS_URL: redis:6379
      COOKIE_SECURE: "false"
      TRUST_PROXY_HEADERS: "false"
      PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@example.com}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: skills-hub-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis-data:/data

volumes:
  redis-data:
